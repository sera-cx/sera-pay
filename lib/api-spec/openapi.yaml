openapi: 3.1.0
info:
  title: Api
  version: 0.1.0
  description: API specification
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: sera
    description: Sera exchange rate operations
paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      description: Returns server health status
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"
  /sera/query:
    post:
      operationId: seraQuery
      tags: [sera]
      summary: Proxy GraphQL query to sera.cx
      description: Proxies a GraphQL query to the sera.cx subgraph API
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SeraQueryRequest"
      responses:
        "200":
          description: GraphQL response
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SeraQueryResponse"
        "500":
          description: Error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
components:
  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required:
        - status
    SeraQueryRequest:
      type: object
      properties:
        query:
          type: string
        variables:
          type: object
      required:
        - query
    SeraQueryResponse:
      type: object
      properties:
        data:
          type: object
    ErrorResponse:
      type: object
      properties:
        error:
          type: string
      required:
        - error
