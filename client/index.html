<!doctype html>
<html lang="en">

  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- Primary SEO -->
    <title>SeraPay — Accept Stablecoin Payments Instantly</title>
    <meta name="description" content="SeraPay lets merchants accept USDC, USDT and other stablecoins via QR code or payment link. No bank account or KYC required. Powered by Sera Protocol." />
    <meta name="keywords" content="stablecoin payments, accept USDC, accept USDT, crypto QR payment, SeraPay, Sera Protocol" />

    <!-- Open Graph -->
    <meta property="og:title" content="SeraPay — Accept Stablecoin Payments Instantly" />
    <meta property="og:description" content="Accept USDC, USDT and other stablecoins via QR code or payment link. No bank account or KYC required." />
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://pay.sera.cx" />
    <meta property="og:image" content="/icon-512.png" />
    <meta property="og:image:width" content="1129" />
    <meta property="og:image:height" content="630" />

    <!-- Twitter Card -->
    <meta name="twitter:card" content="summary" />
    <meta name="twitter:title" content="SeraPay — Accept Stablecoin Payments Instantly" />
    <meta name="twitter:description" content="Accept USDC, USDT and other stablecoins via QR code or payment link. No bank account or KYC required." />

    <!-- Structured Data -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "WebApplication",
      "name": "SeraPay",
      "url": "https://pay.sera.cx",
      "description": "SeraPay lets merchants accept USDC, USDT and other stablecoins via QR code or payment link. No bank account or KYC required. Powered by Sera Protocol.",
      "applicationCategory": "FinanceApplication",
      "operatingSystem": "Any",
      "browserRequirements": "Requires JavaScript",
      "offers": {
        "@type": "Offer",
        "price": "0",
        "priceCurrency": "USD"
      },
      "creator": {
        "@type": "Organization",
        "name": "Sera Protocol",
        "url": "https://sera.cx"
      }
    }
    </script>

    <!-- PWA Manifest -->
    <link rel="manifest" href="/manifest.json" />

    <!-- iOS PWA -->
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <meta name="apple-mobile-web-app-title" content="SeraPay" />
    <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png" />
    <link rel="apple-touch-startup-image" href="/apple-touch-icon.png" />

    <!-- Android / Chrome PWA -->
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="application-name" content="SeraPay" />

    <!-- Favicons -->
    <link rel="icon" type="image/x-icon" href="/favicon.ico" />
    <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32x32.png" />
    <link rel="icon" type="image/png" sizes="16x16" href="/favicon-16x16.png" />
    <meta name="theme-color" content="#22c55e" />
    <meta name="msapplication-TileColor" content="#22c55e" />
    <meta name="msapplication-TileImage" content="/icon-192.png" />

    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />

    <!-- Performance: preconnect to critical third-party origins -->
    <!-- Privy auth API -->
    <link rel="preconnect" href="https://auth.privy.io" />
    <link rel="dns-prefetch" href="https://auth.privy.io" />
    <!-- Alchemy RPC -->
    <link rel="dns-prefetch" href="https://eth-mainnet.g.alchemy.com" />
    <link rel="dns-prefetch" href="https://eth-sepolia.g.alchemy.com" />
    <!-- WalletConnect -->
    <link rel="dns-prefetch" href="https://relay.walletconnect.com" />
    <style>
      html,
      body,
      #root {
        min-height: 100%;
        margin: 0;
        background: #ffffff;
      }

      .app-boot-loader {
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        font-family: Inter, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        color: #66756f;
      }

      .app-boot-loader__inner {
        display: flex;
        flex-direction: column;
        align-items: center;
        text-align: center;
      }

      .app-boot-loader__logo {
        width: 48px;
        height: 48px;
        display: block;
        object-fit: contain;
      }

      .app-boot-loader__spinner {
        width: 32px;
        height: 32px;
        margin-top: 20px;
        border-radius: 999px;
        border: 2px solid rgba(0, 209, 160, 0.2);
        border-top-color: #00d1a0;
        animation: app-boot-spin 0.8s linear infinite;
      }

      .app-boot-loader__text {
        margin-top: 16px;
        font-size: 14px;
        font-weight: 500;
      }

      @keyframes app-boot-spin {
        to {
          transform: rotate(360deg);
        }
      }
    </style>
  </head>

  <body>
    <div id="root">
      <div class="app-boot-loader">
        <div class="app-boot-loader__inner">
          <img class="app-boot-loader__logo" src="/icon-512.png" alt="SeraPay" />
          <div class="app-boot-loader__spinner"></div>
          <div class="app-boot-loader__text">Opening SeraPay</div>
        </div>
      </div>
    </div>
    <script type="module" src="/src/main.tsx"></script>
  </body>

</html>
